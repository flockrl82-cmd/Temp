version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"     # Web UI & API
      - "2525:2525"     # SMTP Server
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/temporalmail
      - NODE_ENV=production
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=temporalmail
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
